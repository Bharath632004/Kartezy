      dockerfile: ./backend/auth-service/Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-prod}
      SPRING_APPLICATION_NAME: auth-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kartezy
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-kartezy}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "${REDIS_PORT:-6379}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: "${JWT_EXPIRATION:-86400000}"
      JWT_REFRESH_TOKEN_EXPIRATION: "${JWT_REFRESH_EXPIRATION:-604800000}"
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
