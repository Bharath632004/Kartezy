  # =====================
  # Reverse Proxy
  # =====================
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    environment:
      NGINX_HOST: ${NGINX_HOST:-localhost}
    volumes:
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - kartezy-network

