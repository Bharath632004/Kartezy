version: '3.8'

# Common configurations
x-common-service: &common-service
  restart: unless-stopped
  networks:
    - cartezy-network
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: prod
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
  SPRING_CLOUD_CONFIG_URI: http://config-server:8888
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kratezy
  SPRING_DATASOURCE_USERNAME: kratezy
  SPRING_DATASOURCE_PASSWORD: secret
  SPRING_REDIS_HOST: redis
  SPRING_REDIS_PORT: 6379

x-common-depends: &common-depends
  discovery-server:
    condition: service_healthy
  config-server:
    condition: service_healthy
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  discovery-server:
    build:
      context: ../../../
      dockerfile: ./devops/docker/discovery-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      <<: *common-env
      SPRING_APPLICATION_NAME: discovery-server
      # Override the default zone to point to itself
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    <<: *common-service

  config-server:
    build:
      context: ../../../
      dockerfile: ./devops/docker/config-server/Dockerfile
    ports:
      - "8888:8888"
    environment:
      <<: *common-env
      SPRING_APPLICATION_NAME: config-server
      SPRING_CLOUD_SERVER_GIT_URI: file:///config-repo
      SPRING_CLOUD_SERVER_GIT_CLONE_ON_START: true
    volumes:
      - ../../config-repo:/config-repo
    depends_on:
      discovery-server:
        condition: service_healthy
    <<: *common-service

  api-gateway:
    build:
      context: ../../../
      dockerfile: ./devops/docker/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      SPRING_APPLICATION_NAME: api-gateway
    depends_on:
      <<: *common-depends
    <<: *common-service

  auth-service:
    build:
      context: ../../../
      dockerfile: ./devops/docker/auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
      SPRING_APPLICATION_NAME: auth-service
    depends_on:
      <<: *common-depends
    <<: *common-service

  user-service:
