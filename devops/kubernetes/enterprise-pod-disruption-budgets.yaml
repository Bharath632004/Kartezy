  selector:
    matchLabels:
      app: warehouse-service
---
# Fraud Detection - Max 1 pod unavailable
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-detection-pdb
  namespace: kartezy
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: fraud-detection-service
