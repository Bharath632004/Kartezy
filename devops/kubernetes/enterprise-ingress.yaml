# ============================================================
# Kartezy Enterprise Ingress Configuration
# Multi-tenant routing, geo-routing, SSL termination, rate limiting
# ============================================================

---
# Main API Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kartezy-api-ingress
  namespace: kartezy
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"

    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-rpm: "6000"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "1000"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.kartezy.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-Tenant-Id,X-Language,X-Currency,X-Timezone"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(self), microphone=(), camera=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

    # WAF
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"

    # Affinity
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "KARTEZY_SESSION"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"

    # SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - "*.kartezy.com"
        - "kartezy.com"
        - "api.kartezy.com"
      secretName: kartezy-tls
  rules:
    # Main API routing
    - host: api.kartezy.com
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8081
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8082
          - path: /api/merchants
            pathType: Prefix
            backend:
              service:
                name: merchant-service
                port:
                  number: 8083
          - path: /api/catalog
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 8084
          - path: /api/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory-service
                port:
                  number: 8085
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8086
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 8087
          - path: /api/delivery
            pathType: Prefix
            backend:
              service:
                name: delivery-service
                port:
                  number: 8088
          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8089
          - path: /api/wallet
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 8090
          - path: /api/reviews
            pathType: Prefix
            backend:
              service:
                name: review-service
                port:
                  number: 8091
          - path: /api/recommendations
            pathType: Prefix
            backend:
              service:
                name: recommendation-service
                port:
                  number: 8092
          - path: /api/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 8093
          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8094
          - path: /api/forecasting
            pathType: Prefix
            backend:
              service:
                name: forecasting-service
                port:
                  number: 8095
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: chatbot-service
                port:
                  number: 8096
          - path: /api/search
            pathType: Prefix
            backend:
              service:
                name: search-service
                port:
                  number: 8106
          - path: /api/fraud
            pathType: Prefix
            backend:
              service:
                name: fraud-detection-service
                port:
                  number: 8101
          - path: /api/finance
            pathType: Prefix
            backend:
              service:
                name: finance-service
                port:
                  number: 8104
          - path: /api/cms
            pathType: Prefix
            backend:
              service:
                name: cms-service
                port:
                  number: 8105
          - path: /api/support
            pathType: Prefix
            backend:
              service:
                name: support-service
                port:
                  number: 8103
          - path: /api/pricing
            pathType: Prefix
            backend:
