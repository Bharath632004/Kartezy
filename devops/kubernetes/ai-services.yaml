# AI/ML Microservices - Kartezy
---
# AI Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: kartezy
  labels:
    app: ai-service
    tier: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        tier: ai
    spec:
      containers:
      - name: ai-service
        image: kartezy/ai-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8094
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_APPLICATION_NAME
          value: ai-service
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://discovery-server:8761/eureka/
        - name: SPRING_CLOUD_CONFIG_URI
          value: http://config-server:8888
        - name: SPRING_REDIS_HOST
          value: redis
        - name: ELASTICSEARCH_HOST
          value: elasticsearch
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8094
          initialDelaySeconds: 90
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8094
          initialDelaySeconds: 30
          periodSeconds: 5
        resources:
          limits:
            memory: 2Gi
            cpu: 2
          requests:
            memory: 1Gi
            cpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: kartezy
spec:
  selector:
    app: ai-service
  ports:
  - port: 8094
    targetPort: 8094

