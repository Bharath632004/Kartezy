---
# RabbitMQ Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-exporter
  namespace: kartezy
  labels:
    app: rabbitmq-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-exporter
  template:
    metadata:
      labels:
        app: rabbitmq-exporter
    spec:
      containers:
        - name: rabbitmq-exporter
          image: kbudde/rabbitmq-exporter:v1.1.0
          ports:
            - containerPort: 9419
          env:
            - name: RABBITMQ_URL
              value: http://rabbitmq:15672
            - name: RABBITMQ_USER
              value: kartezy
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kartezy-secrets
                  key: rabbitmq-password
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
            requests:
              memory: 64Mi
              cpu: 50m
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-exporter
  namespace: kartezy
  labels:
    app: rabbitmq-exporter
spec:
  selector:
    app: rabbitmq-exporter
  ports:
    - port: 9419
      targetPort: 9419

---
# Elasticsearch Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-exporter
  namespace: kartezy
  labels:
    app: elasticsearch-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-exporter
  template:
    metadata:
      labels:
        app: elasticsearch-exporter
    spec:
      containers:
        - name: elasticsearch-exporter
          image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
          ports:
            - containerPort: 9114
          args:
            - --es.uri=http://elasticsearch:9200
            - --es.all
            - --es.indices
            - --es.cluster_settings
            - --es.indices_settings
            - --es.shards
            - --es.snapshots
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-exporter
  namespace: kartezy
  labels:
    app: elasticsearch-exporter
spec:
  selector:
    app: elasticsearch-exporter
  ports:
    - port: 9114
      targetPort: 9114
