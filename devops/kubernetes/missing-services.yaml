---
# Support Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-service
  namespace: kartezy
  labels:
    app: support-service
    tier: business
spec:
  replicas: 2
  selector:
    matchLabels:
      app: support-service
  template:
    metadata:
      labels:
        app: support-service
        tier: business
    spec:
      containers:
        - name: support-service
          image: kartezy/support-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8103
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SPRING_APPLICATION_NAME
              value: support-service
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-server:8888
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/kartezy
            - name: SPRING_DATASOURCE_USERNAME
              value: kartezy
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kartezy-secrets
                  key: postgres-password
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8103
            initialDelaySeconds: 90
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8103
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            limits:
              memory: 768Mi
              cpu: 500m
            requests:
              memory: 384Mi
              cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: support-service
  namespace: kartezy
spec:
  selector:
    app: support-service
  ports:
    - port: 8103
      targetPort: 8103

