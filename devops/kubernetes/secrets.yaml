apiVersion: v1
kind: Secret
metadata:
  name: kartezy-secrets
  namespace: kartezy
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  # ⚠️ PRODUCTION REQUIREMENT ⚠️
  # This is a TEMPLATE file only. In production:
  # - Use SealedSecrets (bitnami) to encrypt these values
  # - Or use External Secrets Operator with AWS Secrets Manager / GCP Secret Manager / HashiCorp Vault
  # - Or use `kubectl create secret generic kartezy-secrets --from-literal=key=value`
  #
  # NEVER commit actual secrets to this repository.
  #
  # Generate JWT secrets: openssl rand -base64 32
  # Generate passwords: openssl rand -base64 24

  # Database Secrets
  postgres-password: ""  # Set via external secrets manager
  mongodb-password: ""   # Set via external secrets manager
  redis-password: ""     # Set via external secrets manager

  # Message Queue Secrets
  rabbitmq-password: ""  # Set via external secrets manager
  kafka-password: ""     # Set via external secrets manager

  # Search Secrets
  elasticsearch-password: ""  # Set via external secrets manager

  # JWT Secrets (generate: openssl rand -base64 32)
  jwt-secret: ""              # Set via external secrets manager
  jwt-refresh-secret: ""      # Set via external secrets manager

  # Payment Gateway - Set these via environment or secrets manager
  stripe-api-key: ""          # Set via external secrets manager
  stripe-webhook-secret: ""   # Set via external secrets manager

  # SMS / Email
  twilio-account-sid: ""      # Set via external secrets manager
  twilio-auth-token: ""       # Set via external secrets manager
  sendgrid-api-key: ""        # Set via external secrets manager

  # OAuth
  google-client-id: ""        # Set via external secrets manager
  google-client-secret: ""    # Set via external secrets manager
  facebook-client-id: ""      # Set via external secrets manager
  facebook-client-secret: ""  # Set via external secrets manager

  # Monitoring
  grafana-admin-user: "admin"
  grafana-admin-password: ""  # Set via external secrets manager

  # Object Storage
  aws-access-key-id: ""       # Set via external secrets manager
  aws-secret-access-key: ""   # Set via external secrets manager
  aws-s3-bucket: "kartezy-media"

  # AI Platform
  openai-api-key: ""          # Set via external secrets manager
  huggingface-api-key: ""     # Set via external secrets manager
---
apiVersion: v1
kind: Secret
metadata:
  name: kartezy-env
  namespace: kartezy
type: Opaque
stringData:
  SPRING_PROFILES_ACTIVE: "k8s"
  JWT_EXPIRATION: "86400000"
  JWT_REFRESH_EXPIRATION: "604800000"
  SPRING_REDIS_TIMEOUT: "60000"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "600000"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"
  KAFKA_CONSUMER_CONCURRENCY: "3"
  ELASTICSEARCH_CONNECTION_TIMEOUT: "5000"
  ELASTICSEARCH_SOCKET_TIMEOUT: "60000"
