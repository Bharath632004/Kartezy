apiVersion: v1
kind: Secret
metadata:
  name: kartezy-secrets
  namespace: kartezy
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  # NOTE: These are template values. In production, use external-secrets operator,
  # sealed-secrets (bitnami), or vault to manage secrets securely.
  # Replace with: kubectl create secret generic kartezy-secrets \
  #   --from-literal=postgres-password=<value> \
  #   --from-literal=jwt-secret=<value> ...

  # Database Secrets
  postgres-password: "REPLACE_WITH_SECURE_PASSWORD_1"
  mongodb-password: "REPLACE_WITH_SECURE_PASSWORD_2"
  redis-password: "REPLACE_WITH_SECURE_REDIS_PASSWORD"

  # Message Queue Secrets
  rabbitmq-password: "REPLACE_WITH_SECURE_PASSWORD_3"
  kafka-password: "REPLACE_WITH_SECURE_KAFKA_PASSWORD"

  # Search Secrets
  elasticsearch-password: "REPLACE_WITH_SECURE_PASSWORD_4"

  # JWT Secrets (generate: openssl rand -base64 32)
  jwt-secret: "REPLACE_WITH_BASE64_256BIT_JWT_SECRET"
  jwt-refresh-secret: "REPLACE_WITH_BASE64_256BIT_REFRESH_SECRET"

  # API Keys (set to actual values or leave as-is for development)
  stripe-api-key: "sk_test_placeholder"
  stripe-webhook-secret: "whsec_placeholder"

  # SMS / Email
  twilio-account-sid: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  twilio-auth-token: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  sendgrid-api-key: "SG.placeholder"

  # OAuth
  google-client-id: "xxxxxxxxxxxx-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx.apps.googleusercontent.com"
  google-client-secret: "GOCSPX-xxxxxxxxxxxxxxxxxxxx"
  facebook-client-id: "123456789012345"
  facebook-client-secret: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  # Monitoring
  grafana-admin-user: "admin"
  grafana-admin-password: "REPLACE_WITH_GRAFANA_PASSWORD"

  # Object Storage
  aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
  aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
  aws-s3-bucket: "kartezy-media"

  # AI Platform
  openai-api-key: "sk-placeholder"
  huggingface-api-key: "hf_placeholder"
---
apiVersion: v1
kind: Secret
metadata:
  name: kartezy-env
  namespace: kartezy
type: Opaque
stringData:
  SPRING_PROFILES_ACTIVE: "k8s"
  JWT_EXPIRATION: "86400000"
  JWT_REFRESH_EXPIRATION: "604800000"
  SPRING_REDIS_TIMEOUT: "60000"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "600000"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"
  KAFKA_CONSUMER_CONCURRENCY: "3"
  ELASTICSEARCH_CONNECTION_TIMEOUT: "5000"
  ELASTICSEARCH_SOCKET_TIMEOUT: "60000"
