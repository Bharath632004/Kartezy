# ============================================================
# Kartezy SonarQube Configuration for SAST
# ============================================================

sonar.projectKey=kartezy-platform
sonar.organization=kartezy
sonar.host.url=https://sonarcloud.io

# Sources
sonar.sources=backend,apps,shared,bi-platform,enterprise-crm,erp-finance-platform,ai-platform
sonar.exclusions=**/test/**,**/build/**,**/target/**,**/node_modules/**,**/.dart_tool/**,**/*.g.dart,**/generated/**

# Language-specific
sonar.java.binaries=backend/**/target/classes
sonar.java.source=21
sonar.java.libraries=backend/**/target/dependency/*
sonar.java.test.libraries=backend/**/target/test-dependency/*
sonar.javascript.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.min.js
sonar.typescript.exclusions=**/node_modules/**,**/build/**,**/dist/**

# Tests
sonar.tests=.
sonar.test.inclusions=**/*Test*,**/*test*,**/*Spec*,**/*spec*
sonar.test.exclusions=**/node_modules/**,**/build/**

# Quality Gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Security Rules
sonar.java.security.bouncycastle.enabled=true
sonar.java.security.owasp.top10.2021.enabled=true
sonar.java.security.cwe.enabled=true

# Code Coverage
sonar.coverage.jacoco.xmlReportPaths=backend/**/target/site/jacoco/jacoco.xml

# Source encoding
sonar.sourceEncoding=UTF-8

# Duplication
sonar.cpd.exclusions=**/*DTO.java,**/*dto/**,**/*Request.java,**/*Response.java
