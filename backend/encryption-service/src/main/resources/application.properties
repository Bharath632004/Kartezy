# Encryption Service Configuration
server.port=8083

# Application name
spring.application.name=encryption-service

# Key management settings
encryption.key.retention-days=365
encryption.key.rotation-interval-days=90
encryption.default.key-size=256

# HSM settings (disabled by default)
encryption.hsm.enabled=false
encryption.hsm.provider=
encryption.hsm.pin=
encryption.hsm.slot=

# Key store configuration (for software-based keystore)
encryption.keystore.location=
encryption.keystore.password=
encryption.keystore.type=PKCS12

# Audit logging
encryption.audit.enabled=true
encryption.audit.log-key-access=true
encryption.audit.log-key-operations=true

# Performance settings
encryption.async.enabled=true
encryption.async.pool-size=10