server:
  port: 8081

spring:
  application:
    name: auth-service
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/kartezy
    driver-class-name: org.postgresql.Driver
    username: kartezy
    password: ${POSTGRES_PASSWORD:kartezy_dev_2024}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://auth-service:8081}
          jwk-set-uri: ${JWK_SET_URI:http://auth-service:8081/oauth2/jwks}
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
          apple:
            client-id: ${APPLE_CLIENT_ID}
            team-id: ${APPLE_TEAM_ID}
            key-id: ${APPLE_KEY_ID}
            private-key: ${APPLE_PRIVATE_KEY}
            scope:
              - name
              - email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope:
              - email
              - public_profile

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

kartezy:
  enterprise:
    multitenant:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://discovery-server:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    prometheus:
      enabled: true
  metrics:
    enable:
      http: true
      jdbc: true
      redis: true
      cache: true
    export:
      prometheus:
        enabled: true
        step: 30s