server:
  port: 8080

spring:
  application:
    name: auth-service
  cloud:
    config:
      uri: http://config-server:8888
    discovery:
      enabled: true
      service-id: config-server
  # For Consul or other service discovery, but we are using Eureka
eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always