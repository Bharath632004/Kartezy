server:
  shutdown: graceful
  port: 8093

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/kartezy_notification}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:kartezy}
    password: ${DB_PASSWORD:kartezy}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  config:
    import: configserver:http://config-server:8888
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
        max-attempts: 6
    discovery:
      enabled: true
      service-id: config-server

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /notifications/v3/api-docs
  swagger-ui:
    path: /notifications/swagger-ui.html

logging:
  level:
    com.kartezy.notificationservice: INFO
