server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Global filters
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      # You can define specific routes here if needed
      # routes:
      #   - id: auth-service
      #     uri: lb://auth-service
      #     predicates:
      #       - Path=/api/auth/**
      #     filters:
      #       - RewritePath=/api/auth/(?<segment>.*), /$\{segment}
      #   - id: user-service
      #     uri: lb://user-service
      #     predicates:
      #       - Path=/api/users/**
      #     filters:
      #       - RewritePath=/api/users/(?<segment>.*), /$\{segment}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Config client configuration
spring:
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
        max-attempts: 6

# Resilience4j Circuit Breaker configuration
resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 5000
  ratelimiter:
    instances:
      default:
        registerHealthIndicator: true
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0s
  timelimiter:
    instances:
      default:
        timeoutDuration: 4s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
      show-components: always