server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Global filters
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      # Routes are defined in code for more flexibility
      # Global filters
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - RemoveResponseHeader=Cookie
        - RemoveRequestHeader=Cookie
        - RemoveRequestHeader=Authorization
      # Global filters for security and logging
      # We'll add custom filters in code

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

# Config client configuration
spring:
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
        max-attempts: 6

# Resilience4j Circuit Breaker configuration
resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 5000
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
  ratelimiter:
    instances:
      default:
        registerHealthIndicator: true
        limitForPeriod: 1000
        limitRefreshPeriod: 1s
        timeoutDuration: 0s
  timelimiter:
    instances:
      default:
        timeoutDuration: 4s

# Global rate limiter
spring:
  cloud:
    gateway:
      default-filters:
        - RequestRateLimiter=default, KeyResolver=@ path:request.remoteAddr
      routes:
        # Routes are defined in code for more flexibility

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,configprops,env,beans
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      slo:
        http.server.requests: 10ms,50ms,100ms,200ms,500ms,1s,2s,5s,10s
  tracing:
    sampling:
      probability: 1.0