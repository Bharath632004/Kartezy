# Secrets Service Configuration
server.port=8111

# Application name
spring.application.name=secrets-service

# Secrets manager selection
# Options: vault, aws, azure
secrets.manager.type=vault

# Vault configuration
secrets.vault.address=http://localhost:8200
secrets.vault.token=
secrets.vault.namespace=

# AWS Secrets Manager configuration
secrets.aws.region=us-east-1
secrets.aws.access-key-id=
secrets.aws.secret-access-key=

# Azure Key Vault configuration
secrets.azure.key-vault-name=
secrets.azure.client-id=
secrets.azure.client-secret=
secrets.azure.tenant-id=

# Secret rotation settings
secrets.rotation.enabled=true
secrets.rotation.interval-days=30
secrets.rotation.check-time=0 0 2 * * ? # Daily at 2 AM

# Dynamic secrets settings
secrets.dynamic.enabled=true
secrets.dynamic.ttl-seconds=3600 # 1 hour TTL for dynamic secrets

# Lease management
secrets.lease.enabled=true
secrets.lease.default-lease-seconds=1800 # 30 minute default lease

# Audit logging
secrets.audit.enabled=true
secrets.audit.log-access=true
secrets.audit.log-modifications=true

# Performance settings
secrets.async.enabled=true
secrets.async.pool-size=10