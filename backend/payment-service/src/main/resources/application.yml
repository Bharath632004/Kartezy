server:
  shutdown: graceful
  port: 8092

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: payment-service
  config:
    import: configserver:http://config-server:8888
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
        max-attempts: 6
    discovery:
      enabled: true
      service-id: config-server
  # Removed datasource and jpa - configured via config server

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}"
      show-components: when-authorized
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /payments/v3/api-docs
  swagger-ui:
    path: /payments/swagger-ui.html

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:whsec_placeholder}
  currency: INR

logging:
  level:
    com.kartezy.paymentservice: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
