server:
  shutdown: graceful
  port: 8084

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: catalog-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/kartezy_catalog}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:kartezy}
    password: ${DB_PASSWORD:kartezy}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  config:
    import: configserver:http://config-server:8888
  cloud:
    config:
      uri: http://config-server:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
        max-attempts: 6
    discovery:
      enabled: true
      service-id: config-server

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}"

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: ${JWT_ISSUER_URI:http://auth-service:8081}
        jwk-set-uri: ${JWK_SET_URI:http://auth-service:8081/oauth2/jwks}
