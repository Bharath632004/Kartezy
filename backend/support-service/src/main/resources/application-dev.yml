server:
  port: 8096
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kartezy_support
    username: postgres
    password: ${DB_PASSWORD:postgres}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
eureka:
  client:
    enabled: false
logging:
  level:
    com.kartezy.supportservice: DEBUG
