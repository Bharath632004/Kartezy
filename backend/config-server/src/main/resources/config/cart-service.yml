server:
  port: ${PORT:8087}

spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:postgresql://postgres:5432/kartezy
    username: ${SPRING_DATASOURCE_USERNAME:kartezy}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.kartezy: DEBUG
