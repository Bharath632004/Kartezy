name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - '!apps/**/*.md'  # Ignore markdown files
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/**'
      - '!apps/**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [customer-web, merchant-web, admin-dashboard, landing-page]
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    - name: Install dependencies
      run: |
        cd apps/${{ matrix.app }}
        npm ci
    - name: Run tests
      run: |
        cd apps/${{ matrix.app }}
        npm test