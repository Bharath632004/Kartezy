# ============================================================
# Kartezy Dependabot Configuration
# Automated dependency updates with security patches
# ============================================================

version: 2
updates:
  # Backend - Maven
  - package-ecosystem: "maven"
    directory: "/backend/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - "team-sre"
      - "team-backend"
    assignees:
      - "sre-team"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
    target-branch: "develop"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.cloud:*"
        update-types: ["version-update:semver-major"]
    vendor: true
    versioning-strategy: increase

  # Admin Dashboard - npm
  - package-ecosystem: "npm"
    directory: "/apps/admin-dashboard/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 15
    labels:
      - "dependencies"
      - "security"
      - "frontend"
    reviewers:
      - "team-frontend"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"

  # Website - npm
  - package-ecosystem: "npm"
    directory: "/apps/kartezy-website/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "website"

  # Flutter Apps
  - package-ecosystem: "pub"
    directory: "/apps/customer-mobile/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "flutter"
    open-pull-requests-limit: 10

  - package-ecosystem: "pub"
    directory: "/apps/merchant-mobile/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "flutter"

  - package-ecosystem: "pub"
    directory: "/apps/delivery-mobile/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "flutter"

  # AI Platform - npm
  - package-ecosystem: "npm"
    directory: "/ai-platform/"
    schedule:
      interval: "weekly"
      day: "monday"
      labels:
        - "dependencies"
        - "ai"

  # Docker
  - package-ecosystem: "docker"
    directory: "/devops/docker/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci-cd"
