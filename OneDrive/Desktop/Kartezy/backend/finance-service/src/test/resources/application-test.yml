# Test profile - overrides main configuration for testing
# Uses H2 in-memory database and disables external service dependencies

server:
  port: 0

spring:
  application:
    name: finance-service-test

  # In-memory H2 database for testing
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Disable Flyway for tests (Hibernate ddl-auto handles schema)
  flyway:
    enabled: false

  # Disable Kafka for tests
  kafka:
    bootstrap-servers: localhost:0
    consumer:
      auto-offset-reset: latest
    listener:
      auto-startup: false

  # Disable OAuth2 security and Kafka for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:
          jwk-set-uri:

  cache:
    type: simple

  main:
    allow-bean-definition-overriding: true

# Disable Eureka for tests
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Disable logging in tests
logging:
  level:
    com.kartezy: WARN
    org.hibernate: WARN
    org.springframework: WARN

# Test-specific JWT secret for generating test tokens
app:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-testing-only
    expiration-ms: 3600000
