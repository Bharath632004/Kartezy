server:
  port: 8096
  servlet:
    context-path: /api/finance

spring:
  application:
    name: finance-service

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/kartezy_finance
    username: ${DB_USERNAME:kartezy}
    password: ${DB_PASSWORD:kartezy123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        format_sql: true
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: finance-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Security OAuth2
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/kartezy}
          jwk-set-uri: ${JWT_JWK_URI:http://localhost:8081/realms/kartezy/protocol/openid-connect/certs}

  # Cache
  cache:
    type: simple

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: ${HOST:127.0.0.1}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true

# OpenAPI
springdoc:
  api-docs:
    path: /api/finance/v3/api-docs
  swagger-ui:
    path: /api/finance/swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    com.kartezy: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.springframework.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/finance-service.log
    max-size: 100MB
    max-history: 30
