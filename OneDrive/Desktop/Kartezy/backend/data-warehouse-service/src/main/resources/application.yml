server:
  port: ${WAREHOUSE_SERVICE_PORT:8102}

spring:
  application:
    name: data-warehouse-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/kartezy_warehouse
    username: ${POSTGRES_USER:kartezy}
    password: ${POSTGRES_PASSWORD:password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  data:
    mongodb:
      uri: mongodb://${MONGODB_USER:kartezy}:${MONGODB_PASSWORD:password}@${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/kartezy_analytics
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      cache:
        type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: data-warehouse-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  protocol: http
  username: ${ELASTICSEARCH_USER:}
  password: ${ELASTICSEARCH_PASSWORD:}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

warehouse:
  etl:
    cron:
      orders: "0 0 */1 * * ?"
      inventory: "0 30 */1 * * ?"
      users: "0 0 */2 * * ?"
      payments: "0 0 */1 * * ?"
      merchants: "0 0 */2 * * ?"
      delivery: "0 30 */2 * * ?"
      products: "0 0 */3 * * ?"
    batch-size: 1000
  data-lake:
    path: ${DATA_LAKE_PATH:/data/kartezy/lake}
    retention-days: 365
  cache:
    ttl-seconds: 300
  export:
    max-rows: 100000
    temp-dir: ${EXPORT_TEMP_DIR:/tmp/kartezy/exports}

logging:
  level:
    com.kartezy: INFO
    org.springframework.batch: INFO
