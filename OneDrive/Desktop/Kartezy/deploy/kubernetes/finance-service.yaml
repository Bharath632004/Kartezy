apiVersion: v1
kind: Namespace
metadata:
  name: kartezy-finance
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-service-config
  namespace: kartezy-finance
data:
  application.yml: |
    server:
      port: 8096
      servlet:
        context-path: /api/finance
    spring:
      application:
        name: finance-service
      datasource:
        url: jdbc:postgresql://postgres-service:5432/kartezy_finance
        username: kartezy
        password: kartezy123
        hikari:
          maximum-pool-size: 20
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      flyway:
        enabled: true
        baseline-on-migrate: true
      kafka:
        bootstrap-servers: kafka-service:9092
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: https://auth.kartezy.com/realms/kartezy
              jwk-set-uri: https://auth.kartezy.com/realms/kartezy/protocol/openid-connect/certs
    eureka:
      client:
        service-url:
          defaultZone: http://discovery-service:8761/eureka
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: kartezy-finance
  labels:
    app: finance-service
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      containers:
      - name: finance-service
        image: kartezy/finance-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8096
          name: http
        - containerPort: 8097
          name: actuator
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseZGC"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: finance-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: finance-db-secret
              key: password
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: logs
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /api/finance/actuator/health/liveness
            port: 8096
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/finance/actuator/health/readiness
            port: 8096
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 2
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: config-volume
        configMap:
          name: finance-service-config
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: kartezy-finance
  labels:
    app: finance-service
spec:
  type: ClusterIP
  ports:
  - port: 8096
    targetPort: 8096
    name: http
  - port: 8097
    targetPort: 8097
    name: actuator
  selector:
    app: finance-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finance-service-hpa
  namespace: kartezy-finance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finance-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: finance-service-pdb
  namespace: kartezy-finance
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: finance-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finance-service-network-policy
  namespace: kartezy-finance
spec:
  podSelector:
    matchLabels:
      app: finance-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: kartezy-gateway
    ports:
    - port: 8096
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kartezy-infra
    ports:
    - port: 5432
    - port: 9092
    - port: 8761
    - port: 6379
