---
# Discovery Server (Eureka)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: kartezy
  labels:
    app: discovery-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
      - name: discovery-server
        image: kartezy/discovery-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8761
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_APPLICATION_NAME
          value: discovery-server
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8761
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8761
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          limits:
            memory: 512Mi
            cpu: 500m
          requests:
            memory: 256Mi
            cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: kartezy
spec:
  selector:
    app: discovery-server
  ports:
  - port: 8761
    targetPort: 8761
  clusterIP: None

---
# Config Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: kartezy
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
      - name: config-server
        image: kartezy/config-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_APPLICATION_NAME
          value: config-server
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://discovery-server:8761/eureka/
        - name: SPRING_CLOUD_SERVER_GIT_URI
          value: file:///config-repo
        - name: SPRING_CLOUD_SERVER_GIT_CLONE_ON_START
          value: "true"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8888
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8888
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - mountPath: /config-repo
          name: config-repo
      volumes:
      - name: config-repo
        configMap:
          name: config-repo
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: kartezy
spec:
  selector:
    app: config-server
  ports:
  - port: 8888
    targetPort: 8888

---
# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kartezy
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: kartezy/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_APPLICATION_NAME
          value: api-gateway
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://discovery-server:8761/eureka/
        - name: SPRING_CLOUD_CONFIG_URI
          value: http://config-server:8888
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kartezy-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        resources:
          limits:
            memory: 512Mi
            cpu: 500m
          requests:
            memory: 256Mi
            cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kartezy
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
