# Business Microservices - Kartezy
# Base template for all business services - each follows the same pattern
---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kartezy
  labels:
    app: auth-service
    tier: business
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: business
    spec:
      containers:
      - name: auth-service
        image: kartezy/auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_APPLICATION_NAME
          value: auth-service
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://discovery-server:8761/eureka/
        - name: SPRING_CLOUD_CONFIG_URI
          value: http://config-server:8888
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/kartezy
        - name: SPRING_DATASOURCE_USERNAME
          value: kartezy
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kartezy-secrets
              key: postgres-password
        - name: SPRING_REDIS_HOST
          value: redis
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kartezy-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 90
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
        resources:
          limits:
            memory: 768Mi
            cpu: 500m
          requests:
            memory: 384Mi
            cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kartezy
spec:
  selector:
    app: auth-service
  ports:
  - port: 8081
    targetPort: 8081

