apiVersion: v1
kind: Secret
metadata:
  name: kartezy-secrets
  namespace: kartezy
type: Opaque
stringData:
  # PRODUCTION: Use external secrets manager (e.g., AWS Secrets Manager, Vault) or sealed-secrets
  # DEVELOPMENT: Set via environment variables or docker-compose
  postgres-password: ${POSTGRES_PASSWORD}
  mongodb-password: ${MONGODB_PASSWORD}
  rabbitmq-password: ${RABBITMQ_PASSWORD}
  elasticsearch-password: ${ELASTICSEARCH_PASSWORD}
  jwt-secret: ${JWT_SECRET}
---
apiVersion: v1
kind: Secret
metadata:
  name: kartezy-env
  namespace: kartezy
type: Opaque
stringData:
  SPRING_PROFILES_ACTIVE: k8s
  JWT_EXPIRATION: "86400000"
  JWT_REFRESH_EXPIRATION: "604800000"
