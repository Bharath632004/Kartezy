server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: application-logs
    static_configs:
    - targets: []
      labels:
        job: kartezy-app
        __path__: /var/log/applications/*.log

  - job_name: container-logs
    static_configs:
    - targets: []
      labels:
        job: kartezy-containers
        __path__: /var/log/containers/*.log

  - job_name: audit-logs
    static_configs:
    - targets: []
      labels:
        job: kartezy-audit
        __path__: /var/log/audit/*.log

  - job_name: gateway-logs
    static_configs:
    - targets: []
      labels:
        job: kartezy-gateway
        __path__: /var/log/nginx/*.log

  - job_name: security-logs
    static_configs:
    - targets: []
      labels:
        job: kartezy-security
        __path__: /var/log/security/*.log

  - job_name: database-logs
    static_configs:
    - targets: []
      labels:
        job: kartezy-database
        __path__: /var/log/postgresql/*.log
