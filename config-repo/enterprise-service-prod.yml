# ============================================================
# Kartezy Enterprise Services - Production Configuration
# ============================================================

kartezy:
  enterprise:
    franchise:
      enabled: true
      onboarding-review: true
    whitelabel:
      enabled: true
    geo-replication:
      enabled: true
      active-passive: true
      cross-region-failover: true

spring:
  datasource:
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    show-sql: false

server:
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env

logging:
  level:
    com.kartezy: INFO
    org.springframework: WARN
